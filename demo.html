<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Demo HTML DOM Đơn Giản</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            padding-top: 100px;
            
            transition: background 0.5s, color 0.5s; 
        }
        .dark-mode {
            background-color: #1e293b;
            color: #f8fafc;
        }
        button {
            padding: 12px 24px;
            font-size: 18px;
            cursor: pointer;
            border-radius: 8px;
            border: 2px solid #38bdf8;
            background: #38bdf8;
            color: white;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <h1 id="tieu-de">Chào mừng các bạn đến với giao diện SÁNG</h1>
    <p>Hãy thử bấm vào nút bên dưới để xem sự kỳ diệu của HTML DOM:</p>
    <button id="nut-bam">Bật Chế Độ Tối</button>
    <script>
        
        const tieuDe = document.getElementById("tieu-de");
        const nutBam = document.getElementById("nut-bam");

        nutBam.addEventListener("click", function() {
            
            if (document.body.classList.contains("dark-mode")) {
                
                document.body.classList.remove("dark-mode");
                tieuDe.innerText = "Chào mừng các bạn đến với giao diện SÁNG";
                nutBam.innerText = "Bật Chế Độ Tối";
                nutBam.style.background = "#38bdf8"; 
            } else {
                
                document.body.classList.add("dark-mode");
                tieuDe.innerText = "Chào mừng các bạn đến với giao diện TỐI";
                nutBam.innerText = "Bật Chế Độ Sáng";
                nutBam.style.background = "#ef4444"; 
            }
        });
    </script>
</body>
</html>
